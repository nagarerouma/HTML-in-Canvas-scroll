<!DOCTYPE html>
<!--
    index1.html
    ------------------------------------------------------------------
    このファイルは立方体の 1 面目に貼られる HTML です。

    目的:
    - 通常の HTML の input を 3D キューブの面に表示する
    - クリックすると focus し、文字を入力できることを示す

    ポイント:
    - input 自体は普通の HTML input のままでよい
    - 3D 面上での click / focus は index.html 側で座標変換して転送する
    - このファイル側では「普通の Web ページとして自然に書く」ことが大事
-->
<html lang="ja">
<head>
        <meta charset="UTF-8">
    <style>
        /* ブラウザーの全面に表示するための設定 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        body {
            /* 背景を赤色に設定 */
            background-color: #ff0000; 
            /* 中央揃えのためのFlexbox設定 */
            display: flex;
            justify-content: center;
            align-items: center;
            /* テキストを白色に設定 */
            color: #ffffff;
            font-family: 'Arial Black', sans-serif;
        }

        .number {
            /* 画面サイズに合わせた大きなフォントサイズ */
            font-size: 40vw; 
            line-height: 1;
            /* ネイティブな文字の美しさがCanvas上でも維持されます */
            user-select: none;
        }

        /*
         * 入力欄を下寄せ中央に置くレイアウト。
         * 3D 面の上で「どこに input があるか」が分かりやすくなるよう、
         * 数字とは別の位置に配置している。
         */
        .input-area {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        input[type="text"] {
            font-size: 1.2rem;
            padding: 6px 12px;
            border-radius: 6px;
            border: 2px solid #fff;
            background: rgba(255,255,255,0.2);
            color: #fff;
            outline: none;
            width: 200px;
        }
        input[type="text"]::placeholder {
            color: rgba(255,255,255,0.6);
        }
        label {
            font-size: 0.9rem;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="number">1</div>
        <!--
            普通の label + input。
            HTML-in-Canvas だからといって特別なタグは不要で、
            普通のフォーム部品をそのまま使える。
        -->
    <div class="input-area">
      <label for="name">名前を入力:</label>
      <input
        type="text"
        id="name"
        name="name"
        placeholder="4〜8文字"
        minlength="4"
        maxlength="8"
        size="10" />
    </div>
</body>
</html>
